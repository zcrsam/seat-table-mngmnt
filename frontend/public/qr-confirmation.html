<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bellevue Reservation Confirmation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1B2A4A 0%, #0F1E38 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
            overflow: hidden;
        }
        
        .header {
            background: #1B2A4A;
            padding: 30px 20px;
            text-align: center;
            position: relative;
        }
        
        .header h1 {
            color: #C9A84C;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        
        .header p {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }
        
        .content {
            padding: 40px 30px;
            text-align: center;
        }
        
        .ref-label {
            color: #BBB;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 15px;
        }
        
        .ref-code {
            color: #1B2A4A;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 4px;
            line-height: 1.2;
            margin-bottom: 30px;
            padding: 20px;
            background: #F7F3EA;
            border-radius: 12px;
            border: 2px solid #E8E3DC;
        }
        
        .details {
            background: #F9F7F4;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }
        
        .detail-row:last-child {
            margin-bottom: 0;
        }
        
        .detail-label {
            color: #666;
            font-weight: 500;
        }
        
        .detail-value {
            color: #1B2A4A;
            font-weight: 600;
        }
        
        .status {
            display: inline-block;
            background: rgba(201,168,76,0.1);
            color: #C9A84C;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: 1px solid rgba(201,168,76,0.3);
        }
        
        .footer {
            background: #F7F3EA;
            padding: 20px;
            text-align: center;
            border-top: 1px solid #E8E3DC;
        }
        
        .footer p {
            color: #666;
            font-size: 12px;
            line-height: 1.4;
        }
        
        .gold-accent {
            height: 3px;
            background: linear-gradient(90deg, #C9A84C, #E8C96C, #C9A84C);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1>THE BELLEVUE MANILA</h1>
            <p>Alabang Function Room</p>
        </div>
        
        <div class="gold-accent"></div>
        
        <div class="content">
            <div class="ref-label">Reference Code</div>
            <div class="ref-code" id="refCode">LOADING...</div>
            
            <div class="details">
                <div class="detail-row">
                    <span class="detail-label">Table:</span>
                    <span class="detail-value" id="table">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Date:</span>
                    <span class="detail-value" id="date">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Venue:</span>
                    <span class="detail-value" id="venue">-</span>
                </div>
            </div>
            
            <div class="status">Pending Approval</div>
        </div>
        
        <div class="footer">
            <p>Please present this confirmation at the venue.<br>Keep this page for your records.</p>
        </div>
    </div>

    <script>
        // Parse URL parameters to get reservation details
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                ref: params.get('ref') || 'UNKNOWN',
                table: params.get('table') || '-',
                date: params.get('date') || '-',
                venue: params.get('venue') || 'ALABANG'
            };
        }
        
        // Update page with reservation details
        function updatePage() {
            const details = getUrlParams();
            
            document.getElementById('refCode').textContent = details.ref;
            document.getElementById('table').textContent = details.table;
            document.getElementById('date').textContent = details.date;
            document.getElementById('venue').textContent = details.venue;
            
            // Update page title
            document.title = `Reservation ${details.ref} - Bellevue Manila`;
        }
        
        // Initialize page when loaded
        document.addEventListener('DOMContentLoaded', updatePage);
        
        // Also update if URL changes (for single-page apps)
        window.addEventListener('popstate', updatePage);
    </script>
</body>
</html>
